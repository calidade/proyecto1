<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAP BPM → RPM</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>BPM - RPM</h1>

  <div class="box main">
    <span>BPM</span>
    <h2 id="bpm">0</h2>
  </div>

  <div class="box secondary">
    <span>RPM CICLO INDOOR</span>
    <h2 id="rpm">0</h2>
  </div>

  <button id="tapBtn">PULSA</button>
  <button id="resetBtn">RESET</button>
</div>

<script src="app.js"></script>
</body>
</html>
